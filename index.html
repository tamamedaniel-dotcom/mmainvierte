  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dar-picker-indicator { opacity: 0.6; }\n    select, input { font-family: 'Manrope', sans-serif; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #F6F7F9; color: #171B21; padding-bottom: 60px;\">\n\n  <sc-if value=\"{{!authenticated}}\" hint-placeholder-val=\"{{false}}\">\n    <div style=\"position: fixed; inset: 0; background: #F6F7F9; display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;\">\n      <form sc-camel-on-submit=\"{{onLoginSubmit}}\" style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);\">\n        <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 22px;\">\n          <img src=\"b108d520-6c0e-43bd-86ec-844950a23302\" alt=\"Inviu\" style=\"height: 26px; width: auto;\">\n          <img src=\"bc1755c4-0a9d-43d0-afc1-43df3474a180\" alt=\"Mutual de Médicos Anestesiólogos\" style=\"height: 38px; width: auto;\">\n        <\u002Fdiv>\n        <div style=\"font-size: 18px; font-weight: 800; margin-bottom: 4px;\">Acceso restringido<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #6B7280; margin-bottom: 22px;\">Uso exclusivo socios MMA. Ingresá tus credenciales.<\u002Fdiv>\n        <div style=\"margin-bottom: 14px;\">\n          <label style=\"font-size: 12.5px; color: #6B7280; display: block; margin-bottom: 6px;\">Usuario<\u002Flabel>\n          <input type=\"text\" value=\"{{loginUser}}\" sc-camel-on-change=\"{{onLoginUserChange}}\" sc-camel-auto-complete=\"username\" style=\"width: 100%; padding: 10px 12px; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; font-size: 14px;\">\n        <\u002Fdiv>\n        <div style=\"margin-bottom: 8px;\">\n          <label style=\"font-size: 12.5px; color: #6B7280; display: block; margin-bottom: 6px;\">Contraseña<\u002Flabel>\n          <input type=\"password\" value=\"{{loginPass}}\" sc-camel-on-change=\"{{onLoginPassChange}}\" sc-camel-auto-complete=\"current-password\" style=\"width: 100%; padding: 10px 12px; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; font-size: 14px;\">\n        <\u002Fdiv>\n        <sc-if value=\"{{loginError}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"font-size: 12.5px; color: #DC2626; margin-bottom: 8px;\">Usuario o contraseña incorrectos.<\u002Fdiv>\n        <\u002Fsc-if>\n        <button type=\"submit\" style=\"width: 100%; margin-top: 10px; padding: 11px; border: none; border-radius: 8px; background: #171B21; color: #FFFFFF; font-size: 14px; font-weight: 700; cursor: pointer;\">Ingresar<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"padding: 30px 36px 20px; border-bottom: 1px solid #E4E7EC; background: #FFFFFF; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;\">\n    <div>\n      <div style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.02em;\">Simulá tu cartera de inversión<\u002Fdiv>\n      <div style=\"font-size: 15px; color: #6B7280; margin-top: 4px;\">Armá una cartera con hasta 7 activos, definí aportes y corré un backtest sobre datos históricos reales.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; align-items: flex-end; gap: -1px; flex-shrink: 0; padding-top: 4px;\">\n      <div style=\"display: flex; align-items: center; gap: 18px;\">\n        <img src=\"b108d520-6c0e-43bd-86ec-844950a23302\" alt=\"Inviu\" style=\"height: 32px; width: auto; display: block;\">\n        <img src=\"bc1755c4-0a9d-43d0-afc1-43df3474a180\" alt=\"Mutual de Médicos Anestesiólogos - 40 años con vos\" style=\"height: 48px; width: auto; display: block;\">\n      <\u002Fdiv>\n      <div style=\"font-size: 11.5px; color: #9AA1AC; font-weight: 600; letter-spacing: 0.02em; margin-top: -1px; position: relative; top: -2px;\">Uso exclusivo socios MMA<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding: 20px 36px 0;\">\n    <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;\">\n      <div style=\"font-size: 13px; font-weight: 700; color: #171B21; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;\">Período de backtest<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 10px; flex: 1; min-width: 260px;\">\n        <label style=\"font-size: 12.5px; color: #6B7280; white-space: nowrap;\">Desde<\u002Flabel>\n        <input type=\"date\" value=\"{{startDate}}\" sc-camel-on-change=\"{{onStartChange}}\" min=\"{{minDate}}\" max=\"{{maxDate}}\" style=\"flex: 1; min-width: 140px; padding: 9px 10px; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; font-size: 13.5px;\">\n        <label style=\"font-size: 12.5px; color: #6B7280; white-space: nowrap;\">Hasta<\u002Flabel>\n        <input type=\"date\" value=\"{{endDate}}\" sc-camel-on-change=\"{{onEndChange}}\" min=\"{{minDate}}\" max=\"{{maxDate}}\" style=\"flex: 1; min-width: 140px; padding: 9px 10px; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; font-size: 13.5px;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding: 16px 36px 0;\">\n    <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;\">\n      <div style=\"font-size: 13px; font-weight: 700; color: #171B21; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;\">Aportes<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 10px; flex: 1; min-width: 260px;\">\n        <label style=\"font-size: 12.5px; color: #6B7280; white-space: nowrap;\">Monto inicial<\u002Flabel>\n        <div style=\"display: flex; align-items: center; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; flex: 1; min-width: 140px;\">\n          <div style=\"padding: 9px 4px 9px 10px; font-size: 13.5px; color: #9AA1AC;\">USD<\u002Fdiv>\n          <input type=\"number\" value=\"{{initial}}\" sc-camel-on-change=\"{{onInitialChange}}\" min=\"0\" step=\"100\" style=\"flex: 1; min-width: 0; padding: 9px 10px 9px 4px; border: none; background: transparent; font-size: 13.5px;\">\n        <\u002Fdiv>\n        <label style=\"font-size: 12.5px; color: #6B7280; white-space: nowrap;\">Aporte mensual<\u002Flabel>\n        <div style=\"display: flex; align-items: center; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; flex: 1; min-width: 140px;\">\n          <div style=\"padding: 9px 4px 9px 10px; font-size: 13.5px; color: #9AA1AC;\">USD<\u002Fdiv>\n          <input type=\"number\" value=\"{{monthly}}\" sc-camel-on-change=\"{{onMonthlyChange}}\" min=\"0\" step=\"50\" style=\"flex: 1; min-width: 0; padding: 9px 10px 9px 4px; border: none; background: transparent; font-size: 13.5px;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display: grid; grid-template-columns: 380px 1fr; column-gap: 24px; row-gap: 16px; padding: 24px 36px;\">\n\n    <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px; align-self: start;\">\n      <div style=\"font-size: 13px; font-weight: 700; color: #171B21; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px;\">Composición de cartera<\u002Fdiv>\n\n      <sc-for list=\"{{assetRows}}\" as=\"row\" hint-placeholder-count=\"7\">\n        <div style=\"margin-bottom: 12px;\">\n          <div style=\"display: flex; gap: 8px; align-items: center;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: {{row.color}}; flex-shrink: 0;\"><\u002Fdiv>\n            <sc-raw-select value=\"{{row.asset}}\" sc-camel-on-change=\"{{row.onAssetChange}}\" style=\"flex: 1; min-width: 0; padding: 9px 8px; border-radius: 8px; border: 1px solid #D8DCE3; background: #FBFBFC; font-size: 13.5px; color: #171B21;\">\n              <sc-for list=\"{{assetOptions}}\" as=\"opt\">\n                <option value=\"{{opt.value}}\">{{opt.label}}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-select>\n            <div style=\"display: flex; align-items: center; border: 1px solid #D8DCE3; border-radius: 8px; background: #FBFBFC; overflow: hidden;\">\n              <input type=\"number\" value=\"{{row.pct}}\" sc-camel-on-change=\"{{row.onPctChange}}\" min=\"0\" max=\"100\" step=\"1\" style=\"width: 58px; padding: 9px 4px 9px 8px; border: none; background: transparent; font-size: 13.5px; text-align: right; -moz-appearance: textfield;\">\n              <div style=\"padding: 0 8px 0 2px; font-size: 13px; color: #9AA1AC;\">%<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{row.warning}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"margin: 6px 0 0 16px; font-size: 11.5px; line-height: 1.4; color: #B45309; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 6px; padding: 6px 8px;\">{{row.warning}}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"display: flex; justify-content: space-between; align-items: center; margin-top: 4px; padding-top: 12px; border-top: 1px dashed #E4E7EC;\">\n        <div style=\"font-size: 12px; color: #9AA1AC;\">Suma ingresada: <span class=\"mono\" style=\"color: {{sumColor}}; font-weight: 600;\">{{sumLabel}}<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size: 11px; color: #9AA1AC;\">se normaliza a 100%<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{hasResults}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"display: flex; flex-direction: column; height: 100%;\">\n        <div style=\"display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px; margin-bottom: 16px;\">\n          <sc-for list=\"{{statCards}}\" as=\"card\" hint-placeholder-count=\"5\">\n            <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 10px; padding: 8px 8px; min-width: 0;\">\n              <div style=\"font-size: 12px; line-height: 1.2; color: #9AA1AC; font-weight: 600; text-transform: uppercase; letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis\">{{card.label}}<\u002Fdiv>\n              <div class=\"mono\" style=\"font-size: 18px; font-weight: 700; color: {{card.color}}; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis\">{{card.value}}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px 20px 8px; flex: 1; display: flex; flex-direction: column; min-height: 260px;\">\n            <div style=\"display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; min-height: 34px; flex-shrink: 0;\">\n              <div style=\"font-size: 13px; font-weight: 700; color: #171B21;\">Valor de la cartera<\u002Fdiv>\n              <sc-if value=\"{{valueChart.hover}}\" hint-placeholder-val=\"{{false}}\">\n                <div style=\"text-align: right;\">\n                  <div style=\"font-size: 15px; font-weight: 700; color: #171B21;\">{{valueChart.hover.text}}<\u002Fdiv>\n                  <div style=\"font-size: 11.5px; color: #6B7280;\">{{valueChart.hover.dateText}}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"position: relative; flex: 1; min-height: 0;\">\n              <svg sc-camel-view-box=\"0 0 900 320\" sc-camel-preserve-aspect-ratio=\"none\" style=\"width: 100%; height: 100%; display: block; cursor: crosshair;\" sc-camel-on-mouse-move=\"{{valueChart.onMove}}\" sc-camel-on-mouse-leave=\"{{valueChart.onLeave}}\">\n                <sc-for list=\"{{valueChart.yTicks}}\" as=\"t\" hint-placeholder-count=\"5\">\n                  <line x1=\"108\" x2=\"900\" y1=\"{{t.y}}\" y2=\"{{t.y}}\" stroke=\"#EEF0F3\" stroke-width=\"1.5\"><\u002Fline>\n                <\u002Fsc-for>\n                <path d=\"{{valueChart.areaPath}}\" fill=\"#2F6FED\" fill-opacity=\"0.08\" stroke=\"none\"><\u002Fpath>\n                <path d=\"{{valueChart.linePath}}\" fill=\"none\" stroke=\"{{chartColor}}\" stroke-width=\"3.5\"><\u002Fpath>\n                <sc-if value=\"{{valueChart.hover}}\" hint-placeholder-val=\"{{false}}\">\n                  <line x1=\"{{valueChart.hover.x}}\" x2=\"{{valueChart.hover.x}}\" y1=\"{{valueChart.hover.top}}\" y2=\"{{valueChart.hover.bottom}}\" stroke=\"#B9C0CB\" stroke-width=\"1.5\" stroke-dasharray=\"5,4\"><\u002Fline>\n                  <circle cx=\"{{valueChart.hover.x}}\" cy=\"{{valueChart.hover.y}}\" r=\"7\" fill=\"{{chartColor}}\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle>\n                <\u002Fsc-if>\n              <\u002Fsvg>\n              <sc-for list=\"{{valueChart.yTicks}}\" as=\"t\" hint-placeholder-count=\"5\">\n                <div style=\"position: absolute; left: {{t.leftPct}}; top: {{t.topPct}}; transform: translate(-100%, -50%); font-size: 12px; color: #9AA1AC; white-space: nowrap;\">{{t.label}}<\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-for list=\"{{valueChart.xTicks}}\" as=\"t\" hint-placeholder-count=\"6\">\n                <div style=\"position: absolute; left: {{t.leftPct}}; bottom: 4px; transform: translateX(-50%); font-size: 12px; color: #9AA1AC; white-space: nowrap;\">{{t.label}}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px; grid-column: 1; grid-row: 2 / span 3; align-self: start;\">\n          <div style=\"font-size: 13px; font-weight: 700; color: #171B21; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px;\">Descripción de los activos<\u002Fdiv>\n          <sc-for list=\"{{assetDescriptions}}\" as=\"a\" hint-placeholder-count=\"7\">\n            <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #F1F2F4;\">\n              <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 4px;\">\n                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: {{a.color}}; flex-shrink: 0;\"><\u002Fdiv>\n                <div style=\"font-size: 13px; font-weight: 700; color: #171B21;\">{{a.fullName}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size: 12.5px; color: #6B7280; line-height: 1.5; text-align: justify;\">{{a.description}}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px; grid-column: 1; grid-row: 5; align-self: start;\">\n          <div style=\"font-size: 13px; font-weight: 700; color: #171B21; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px;\">Contactos<\u002Fdiv>\n          <div style=\"margin-bottom: 12px;\">\n            <div style=\"font-size: 14px; font-weight: 700; color: #171B21;\">Lic Francisco Reggiori<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #6B7280; margin-top: 2px;\">Contacto: 11 3387-1494<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 14px; font-weight: 700; color: #171B21;\">Lic. Daniel Tamame<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #6B7280; margin-top: 2px;\">Contacto: 11 3349-7144<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px 20px 8px; grid-column: 2; grid-row: 2; display: flex; flex-direction: column;\">\n          <div style=\"display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; min-height: 34px; flex-shrink: 0;\">\n            <div style=\"font-size: 13px; font-weight: 700; color: #171B21;\">Drawdown: caída desde máximo histórico anterior<\u002Fdiv>\n            <sc-if value=\"{{ddChart.hover}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"text-align: right;\">\n                <div style=\"font-size: 14px; font-weight: 700; color: #171B21;\">{{ddChart.hover.text}}<\u002Fdiv>\n                <div style=\"font-size: 11.5px; color: #6B7280;\">{{ddChart.hover.dateText}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"position: relative; flex: 1; min-height: 140px;\">\n            <svg sc-camel-view-box=\"0 0 900 190\" sc-camel-preserve-aspect-ratio=\"none\" style=\"width: 100%; height: 100%; display: block; cursor: crosshair;\" sc-camel-on-mouse-move=\"{{ddChart.onMove}}\" sc-camel-on-mouse-leave=\"{{ddChart.onLeave}}\">\n              <sc-for list=\"{{ddChart.yTicks}}\" as=\"t\" hint-placeholder-count=\"4\">\n                <line x1=\"108\" x2=\"900\" y1=\"{{t.y}}\" y2=\"{{t.y}}\" stroke=\"#EEF0F3\" stroke-width=\"1.5\"><\u002Fline>\n              <\u002Fsc-for>\n              <path d=\"{{ddChart.areaPath}}\" fill=\"#2F6FED\" fill-opacity=\"0.14\" stroke=\"none\"><\u002Fpath>\n              <path d=\"{{ddChart.linePath}}\" fill=\"none\" stroke=\"{{chartColor}}\" stroke-width=\"3\"><\u002Fpath>\n              <sc-if value=\"{{ddChart.hover}}\" hint-placeholder-val=\"{{false}}\">\n                <line x1=\"{{ddChart.hover.x}}\" x2=\"{{ddChart.hover.x}}\" y1=\"{{ddChart.hover.top}}\" y2=\"{{ddChart.hover.bottom}}\" stroke=\"#B9C0CB\" stroke-width=\"1.5\" stroke-dasharray=\"5,4\"><\u002Fline>\n                <circle cx=\"{{ddChart.hover.x}}\" cy=\"{{ddChart.hover.y}}\" r=\"6\" fill=\"{{chartColor}}\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle>\n              <\u002Fsc-if>\n            <\u002Fsvg>\n            <sc-for list=\"{{ddChart.yTicks}}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"position: absolute; left: {{t.leftPct}}; top: {{t.topPct}}; transform: translate(-100%, -50%); font-size: 12px; color: #9AA1AC; white-space: nowrap;\">{{t.label}}<\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ddChart.xTicks}}\" as=\"t\" hint-placeholder-count=\"6\">\n              <div style=\"position: absolute; left: {{t.leftPct}}; bottom: 4px; transform: translateX(-50%); font-size: 12px; color: #9AA1AC; white-space: nowrap;\">{{t.label}}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{showRecoveryChart}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px 20px 8px; grid-column: 2; grid-row: 3;\">\n            <div style=\"display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; min-height: 34px;\">\n              <div style=\"font-size: 13px; font-weight: 700; color: #171B21;\">Retorno necesario para recuperar<\u002Fdiv>\n              <sc-if value=\"{{rrrChart.hover}}\" hint-placeholder-val=\"{{false}}\">\n                <div style=\"text-align: right;\">\n                  <div style=\"font-size: 14px; font-weight: 700; color: #171B21;\">{{rrrChart.hover.text}}<\u002Fdiv>\n                  <div style=\"font-size: 11.5px; color: #6B7280;\">{{rrrChart.hover.dateText}}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"position: relative;\">\n              <svg sc-camel-view-box=\"0 0 900 190\" style=\"width: 100%; height: auto; display: block; cursor: crosshair;\" sc-camel-on-mouse-move=\"{{rrrChart.onMove}}\" sc-camel-on-mouse-leave=\"{{rrrChart.onLeave}}\">\n                <sc-for list=\"{{rrrChart.yTicks}}\" as=\"t\" hint-placeholder-count=\"4\">\n                  <line x1=\"108\" x2=\"900\" y1=\"{{t.y}}\" y2=\"{{t.y}}\" stroke=\"#EEF0F3\" stroke-width=\"1.5\"><\u002Fline>\n                <\u002Fsc-for>\n                <path d=\"{{rrrChart.areaPath}}\" fill=\"#2F6FED\" fill-opacity=\"0.14\" stroke=\"none\"><\u002Fpath>\n                <path d=\"{{rrrChart.linePath}}\" fill=\"none\" stroke=\"{{chartColor}}\" stroke-width=\"3\"><\u002Fpath>\n                <sc-if value=\"{{rrrChart.hover}}\" hint-placeholder-val=\"{{false}}\">\n                  <line x1=\"{{rrrChart.hover.x}}\" x2=\"{{rrrChart.hover.x}}\" y1=\"{{rrrChart.hover.top}}\" y2=\"{{rrrChart.hover.bottom}}\" stroke=\"#B9C0CB\" stroke-width=\"1.5\" stroke-dasharray=\"5,4\"><\u002Fline>\n                  <circle cx=\"{{rrrChart.hover.x}}\" cy=\"{{rrrChart.hover.y}}\" r=\"6\" fill=\"{{chartColor}}\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle>\n                <\u002Fsc-if>\n              <\u002Fsvg>\n              <sc-for list=\"{{rrrChart.yTicks}}\" as=\"t\" hint-placeholder-count=\"4\">\n                <div style=\"position: absolute; left: {{t.leftPct}}; top: {{t.topPct}}; transform: translate(-100%, -50%); font-size: 12px; color: #9AA1AC; white-space: nowrap;\">{{t.label}}<\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-for list=\"{{rrrChart.xTicks}}\" as=\"t\" hint-placeholder-count=\"6\">\n                <div style=\"position: absolute; left: {{t.leftPct}}; bottom: 4px; transform: translateX(-50%); font-size: 12px; color: #9AA1AC; white-space: nowrap;\">{{t.label}}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background: #FFFFFF; border: 1px solid #E4E7EC; border-radius: 12px; padding: 20px; grid-column: 2; grid-row: 4;\">\n          <div style=\"font-size: 13px; font-weight: 700; color: #171B21; margin-bottom: 12px;\">Rendimiento anual y drawdown máximo<\u002Fdiv>\n          <sc-raw-table style=\"border-collapse: collapse; width: 100%; table-layout: fixed;\">\n            <sc-raw-thead>\n              <sc-raw-tr>\n                <sc-raw-th style=\"text-align: center; font-size: 11.5px; color: #171B21; font-weight: 600; padding: 6px 6px; border-bottom: 1px solid #E4E7EC; width: 44px;\">Año<\u002Fsc-raw-th>\n                <sc-for list=\"{{annualTable.columns}}\" as=\"col\" hint-placeholder-count=\"3\">\n                  <sc-raw-th class=\"mono\" style=\"{{col.headerStyle}}\"><div>{{col.labelLine1}}<\u002Fdiv><div>{{col.labelLine2}}<\u002Fdiv><\u002Fsc-raw-th>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-raw-thead>\n            <sc-raw-tbody>\n              <sc-for list=\"{{annualTable.rows}}\" as=\"row\" hint-placeholder-count=\"4\">\n                <sc-raw-tr>\n                  <sc-raw-td class=\"mono\" style=\"text-align: center; font-size: 12px; color: #171B21; padding: 6px 6px; border-bottom: 1px solid #F1F2F4;\">{{row.year}}<\u002Fsc-raw-td>\n                  <sc-for list=\"{{row.cells}}\" as=\"cell\" hint-placeholder-count=\"3\">\n                    <sc-raw-td class=\"mono\" style=\"{{cell.style}}\">{{cell.text}}<\u002Fsc-raw-td>\n                  <\u002Fsc-for>\n                <\u002Fsc-raw-tr>\n              <\u002Fsc-for>\n              <sc-raw-tr>\n                <sc-raw-td class=\"mono\" style=\"text-align: center; font-size: 12px; font-weight: 700; color: #171B21; padding: 8px 6px;\">Máx. DD<\u002Fsc-raw-td>\n                <sc-for list=\"{{annualTable.ddRow}}\" as=\"cell\" hint-placeholder-count=\"3\">\n                  <sc-raw-td class=\"mono\" style=\"{{cell.style}}\">{{cell.text}}<\u002Fsc-raw-td>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table>\n        <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{noAssetsMessage}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"background: #FFFFFF; border: 1px dashed #D8DCE3; border-radius: 12px; padding: 40px; text-align: center; color: #9AA1AC; font-size: 14px;\">\n        Seleccioná al menos un activo con porcentaje mayor a 0 para ver el backtest.\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;chartColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2F6FED&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#2F6FED&quot;, &quot;#059669&quot;, &quot;#7C3AED&quot;, &quot;#111827&quot;]}, &quot;showRecoveryChart&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}}\">\nconst ASSETS = {\n  GAINVEST: { label: 'FCI Gainvest Renta Fija USD', inception: '2020-01-03', color: '#2F6FED',\n    fullName: 'StoneX Gainvest Renta Fija USD',\n    description: 'Fondo en dólares que invierte principalmente en obligaciones negociables de empresas argentinas de alta calidad crediticia. Genera rendimientos muy estables, ideal también para remunerar saldos líquidos.' },\n  ON:       { label: 'Obligaciones Negociables',     inception: '2016-12-30', color: '#7C3AED',\n    fullName: 'Bonos Corporativos Argentinos',\n    description: 'También llamados obligaciones negociables, son títulos de deuda emitidos por empresas. Se seleccionan emisores de sólida calidad crediticia para combinar estabilidad y rendimiento.' },\n  GLD:      { label: 'GLD',                          inception: '2004-11-19', color: '#B45309',\n    fullName: 'SPDR Gold Shares (GLD)',\n    description: 'ETF que replica el precio del oro sin necesidad de comprar oro físico. Actúa como cobertura frente a la inflación, crisis e incertidumbre en los mercados.' },\n  VIG:      { label: 'VIG',                          inception: '2006-05-05', color: '#059669',\n    fullName: 'Vanguard Dividend Appreciation ETF (VIG)',\n    description: 'ETF que invierte en empresas que aumentan sus dividendos de forma sostenida desde hace al menos 10 años. Ofrece exposición a compañías de alta calidad con un perfil más defensivo y menor volatilidad.' },\n  GSPC:     { label: '^GSPC',                        inception: '1927-12-30', color: '#D97706',\n    fullName: 'SPDR S&P 500 ETF (SPY)',\n    description: 'Brinda exposición a las 500 principales empresas de Estados Unidos. Es una de las inversiones de largo plazo más utilizadas a nivel mundial por su diversificación y crecimiento histórico.' },\n  QQQ:      { label: 'QQQ',                           inception: '1999-03-12', color: '#DC2626',\n    fullName: 'Invesco QQQ Trust (QQQ)',\n    description: 'ETF que invierte en las 100 principales empresas del Nasdaq, con fuerte exposición a tecnología e innovación. Ofrece un elevado potencial de crecimiento para horizontes de largo plazo.' },\n  TQQQ:     { label: 'TQQQ',                          inception: '2010-02-12', color: '#DB2777',\n    fullName: 'ProShares UltraPro QQQ (TQQQ)',\n    description: 'ETF apalancado que busca obtener 3 veces la variación diaria del índice Nasdaq-100. Está orientado a inversores con alta tolerancia al riesgo y una visión alcista del sector tecnológico.' },\n};\nconst ASSET_KEYS = Object.keys(ASSETS);\n\nfunction fmtDate(iso) {\n  const [y, m, d] = iso.split('-');\n  return `${d}/${m}/${y}`;\n}\nfunction fmtUSD(v, decimals) {\n  const n = decimals === undefined ? 0 : decimals;\n  const sign = v < 0 ? '-' : '';\n  return sign + '$' + Math.abs(v).toLocaleString('es-AR', { minimumFractionDigits: n, maximumFractionDigits: n });\n}\nfunction fmtPct(v, decimals) {\n  const n = decimals === undefined ? 1 : decimals;\n  const sign = v > 0 ? '+' : '';\n  return sign + (v * 100).toFixed(n) + '%';\n}\nfunction pctColor(v) {\n  if (v > 0.0001) return '#059669';\n  if (v < -0.0001) return '#DC2626';\n  return '#6B7280';\n}\nfunction valueAtOrBefore(series, dateStr) {\n  let lo = 0, hi = series.length - 1, ans = -1;\n  while (lo <= hi) {\n    const mid = (lo + hi) >> 1;\n    if (series[mid][0] <= dateStr) { ans = mid; lo = mid + 1; } else hi = mid - 1;\n  }\n  return ans === -1 ? null : series[ans][1];\n}\nfunction buildChart(dates, values, opts) {\n  const width = opts.width, height = opts.height;\n  const padTop = opts.padTop, padBottom = opts.padBottom, padLeft = opts.padLeft, padRight = opts.padRight;\n  const n = values.length;\n  const innerW = width - padLeft - padRight, innerH = height - padTop - padBottom;\n  let min = Math.min(...values, opts.baseline !== undefined ? opts.baseline : Infinity);\n  let max = Math.max(...values, opts.baseline !== undefined ? opts.baseline : -Infinity);\n  if (min === max) { max = min + 1; }\n  const scaleX = (i) => padLeft + (n <= 1 ? 0 : (i / (n - 1)) * innerW);\n  const scaleY = (v) => padTop + (1 - (v - min) / (max - min)) * innerH;\n  let linePath = '';\n  for (let i = 0; i < n; i++) {\n    linePath += (i === 0 ? 'M' : 'L') + scaleX(i).toFixed(1) + ',' + scaleY(values[i]).toFixed(1) + ' ';\n  }\n  const baseline = opts.baseline !== undefined ? opts.baseline : min;\n  const baseY = scaleY(baseline);\n  const areaPath = linePath + `L${scaleX(n - 1).toFixed(1)},${baseY.toFixed(1)} L${scaleX(0).toFixed(1)},${baseY.toFixed(1)} Z`;\n\n  const yLabelLeftPct = (((padLeft - 10) / width) * 100).toFixed(2) + '%';\n  const yTicks = [];\n  const tickCount = opts.yTickCount || 4;\n  for (let i = 0; i <= tickCount; i++) {\n    const v = min + (max - min) * (i / tickCount);\n    const y = scaleY(v);\n    yTicks.push({ y: y.toFixed(1), topPct: ((y / height) * 100).toFixed(2) + '%', leftPct: yLabelLeftPct, label: opts.yFormat(v) });\n  }\n  const xTicks = [];\n  const xTickCount = Math.min(opts.xTickCount || 6, n);\n  let lastLabel = null;\n  for (let i = 0; i < xTickCount; i++) {\n    const idx = Math.round((i / (xTickCount - 1 || 1)) * (n - 1));\n    const label = dates[idx].slice(0, 4);\n    if (label !== lastLabel) {\n      const x = scaleX(idx);\n      xTicks.push({ x: x.toFixed(1), leftPct: ((x / width) * 100).toFixed(2) + '%', label });\n      lastLabel = label;\n    }\n  }\n  return { linePath, areaPath, yTicks, xTicks, dates, values, scaleX, scaleY, width, height, padLeft, innerW, padTop, innerH };\n}\n\nclass Component extends DCLogic {\n  state = {\n    authenticated: (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('mma_auth') === '1'),\n    loginUser: '',\n    loginPass: '',\n    loginError: false,\n    rows: [\n      { asset: 'GAINVEST', pct: 40 },\n      { asset: 'ON', pct: 40 },\n      { asset: 'VIG', pct: 20 },\n      { asset: '', pct: 0 },\n      { asset: '', pct: 0 },\n      { asset: '', pct: 0 },\n      { asset: '', pct: 0 },\n    ],\n    initial: 10000,\n    monthly: 0,\n    startDate: '2020-01-03',\n    endDate: '2026-07-02',\n    hover: { idx: null },\n  };\n\n  updateRow(i, field, val) {\n    this.setState(s => {\n      const rows = s.rows.slice();\n      rows[i] = { ...rows[i], [field]: val };\n      return { rows };\n    });\n  }\n\n  makeMoveHandler(key, chart) {\n    return (e) => {\n      const rect = e.currentTarget.getBoundingClientRect();\n      const xFrac = (e.clientX - rect.left) / rect.width;\n      const vbX = xFrac * chart.width;\n      const n = chart.dates.length;\n      let idx = Math.round(((vbX - chart.padLeft) / chart.innerW) * (n - 1));\n      idx = Math.max(0, Math.min(n - 1, idx));\n      this.setState({ hover: { idx } });\n    };\n  }\n\n  makeLeaveHandler(key) {\n    return () => this.setState({ hover: { idx: null } });\n  }\n\n  hoverInfo(key, chart, fmtVal) {\n    const idx = this.state.hover.idx;\n    if (idx == null || !chart.dates) return null;\n    const x = chart.scaleX(idx), y = chart.scaleY(chart.values[idx]);\n    let labelX = x + 14;\n    if (labelX > chart.width - 170) labelX = Math.max(chart.padLeft, x - 170);\n    return {\n      x: x.toFixed(1), y: y.toFixed(1),\n      top: (chart.padTop).toFixed(1), bottom: (chart.padTop + chart.innerH).toFixed(1),\n      leftPct: ((labelX / chart.width) * 100).toFixed(2) + '%',\n      text: fmtVal(chart.values[idx]),\n      dateText: fmtDate(chart.dates[idx]),\n    };\n  }\n\n  simulate(activeAssets, startDate, endDate, initial, monthly) {\n    const data = window.PORTFOLIO_DATA;\n    if (!data) return null;\n    const calendarSource = data.GSPC;\n    const dates = calendarSource.filter(r => r[0] >= startDate && r[0] <= endDate).map(r => r[0]);\n    if (dates.length < 2) return null;\n\n    const seriesMap = {};\n    activeAssets.forEach(a => seriesMap[a.key] = data[a.key]);\n\n    const t0 = dates[0];\n    let lastPrices = {};\n    activeAssets.forEach(a => lastPrices[a.key] = valueAtOrBefore(seriesMap[a.key], t0));\n\n    const balances = {};\n    activeAssets.forEach(a => balances[a.key] = initial * a.weight);\n\n    let indexVal = 100;\n    let lastMonthKey = t0.slice(0, 7);\n    let totalContributed = initial;\n    const cashflows = [{ date: t0, amount: -initial }];\n\n    const outDates = [t0], outValue = [initial], outIndex = [100];\n\n    for (let i = 1; i < dates.length; i++) {\n      const d = dates[i];\n      const curPrices = {};\n      activeAssets.forEach(a => curPrices[a.key] = valueAtOrBefore(seriesMap[a.key], d));\n      const totalBefore = activeAssets.reduce((s, a) => s + balances[a.key], 0);\n      let periodReturn = 0;\n      activeAssets.forEach(a => {\n        const w = totalBefore > 0 ? balances[a.key] / totalBefore : a.weight;\n        const r = (curPrices[a.key] / lastPrices[a.key]) - 1;\n        periodReturn += w * r;\n        balances[a.key] = balances[a.key] * (1 + r);\n      });\n      indexVal = indexVal * (1 + periodReturn);\n      lastPrices = curPrices;\n\n      const monthKey = d.slice(0, 7);\n      if (monthKey !== lastMonthKey && monthly > 0) {\n        activeAssets.forEach(a => balances[a.key] += monthly * a.weight);\n        totalContributed += monthly;\n        lastMonthKey = monthKey;\n        cashflows.push({ date: d, amount: -monthly });\n      }\n\n      const totalValue = activeAssets.reduce((s, a) => s + balances[a.key], 0);\n      outDates.push(d);\n      outValue.push(totalValue);\n      outIndex.push(indexVal);\n    }\n\n    cashflows.push({ date: dates[dates.length - 1], amount: outValue[outValue.length - 1] });\n    return { dates: outDates, value: outValue, index: outIndex, totalContributed, cashflows };\n  }\n\n  xirr(cashflows) {\n    const t0 = new Date(cashflows[0].date + 'T00:00:00Z').getTime();\n    const yearsFrac = cashflows.map(cf => (new Date(cf.date + 'T00:00:00Z').getTime() - t0) / (365 * 86400000));\n    const npv = (r) => cashflows.reduce((s, cf, i) => s + cf.amount / Math.pow(1 + r, yearsFrac[i]), 0);\n    let lo = -0.99, hi = 10;\n    let fLo = npv(lo), fHi = npv(hi);\n    if (isNaN(fLo) || isNaN(fHi) || fLo * fHi > 0) return null;\n    for (let i = 0; i < 100; i++) {\n      const mid = (lo + hi) / 2;\n      const fMid = npv(mid);\n      if (Math.abs(fMid) < 1e-6) return mid;\n      if (fLo * fMid < 0) { hi = mid; fHi = fMid; } else { lo = mid; fLo = fMid; }\n    }\n    return (lo + hi) / 2;\n  }\n\n  yearlyReturns(dates, values, startDate, endDate) {\n    const startYear = parseInt(startDate.slice(0, 4), 10);\n    const endYear = parseInt(endDate.slice(0, 4), 10);\n    const results = {};\n    for (let y = startYear; y <= endYear; y++) {\n      const yStart = y === startYear ? values[0] : valueAtOrBefore(dates.map((d, i) => [d, values[i]]), `${y - 1}-12-31`);\n      const yEnd = y === endYear ? values[values.length - 1] : valueAtOrBefore(dates.map((d, i) => [d, values[i]]), `${y}-12-31`);\n      if (yStart != null && yEnd != null && yStart !== 0) {\n        results[y] = (yEnd / yStart) - 1;\n      }\n    }\n    return results;\n  }\n\n  maxDrawdown(values) {\n    let peak = values[0], maxDd = 0;\n    for (const v of values) {\n      if (v > peak) peak = v;\n      const dd = (v / peak) - 1;\n      if (dd < maxDd) maxDd = dd;\n    }\n    return maxDd;\n  }\n\n  renderVals() {\n    const data = window.PORTFOLIO_DATA;\n    const minDate = data ? data.GSPC[0][0] : '1927-12-30';\n    const maxDate = data ? data.GSPC[data.GSPC.length - 1][0] : '2026-07-02';\n    const startDate = this.state.startDate;\n    const endDate = this.state.endDate;\n\n    const assetOptions = [{ value: '', label: '— Ninguno —' }].concat(\n      ASSET_KEYS.map(k => ({ value: k, label: ASSETS[k].label }))\n    );\n\n    const sumPct = this.state.rows.reduce((s, r) => s + (r.asset ? (Number(r.pct) || 0) : 0), 0);\n\n    const weightMap = {};\n    const warningByAsset = {};\n    this.state.rows.forEach(r => {\n      if (!r.asset || !(Number(r.pct) > 0)) return;\n      const meta = ASSETS[r.asset];\n      if (startDate < meta.inception) {\n        warningByAsset[r.asset] = `${meta.label} comenzó el ${fmtDate(meta.inception)}. Se excluye del backtest por no existir en la fecha de inicio elegida.`;\n        return;\n      }\n      weightMap[r.asset] = (weightMap[r.asset] || 0) + (Number(r.pct) || 0);\n    });\n\n    const activeTotal = Object.values(weightMap).reduce((a, b) => a + b, 0);\n    const activeAssets = Object.keys(weightMap).map(key => ({\n      key, label: ASSETS[key].label, color: ASSETS[key].color, weight: weightMap[key] / activeTotal,\n    }));\n\n    const assetRows = this.state.rows.map((r, i) => ({\n      asset: r.asset, pct: r.pct,\n      color: r.asset ? ASSETS[r.asset].color : '#D8DCE3',\n      warning: r.asset ? warningByAsset[r.asset] : null,\n      onAssetChange: (e) => this.updateRow(i, 'asset', e.target.value),\n      onPctChange: (e) => this.updateRow(i, 'pct', Number(e.target.value)),\n    }));\n\n    const noAssetsMessage = activeAssets.length === 0;\n    let hasResults = false, statCards = [], valueChart = {}, ddChart = {}, rrrChart = {}, annualTable = { columns: [], rows: [], ddRow: [] };\n\n    if (!noAssetsMessage && data) {\n      const sim = this.simulate(activeAssets, startDate, endDate, Number(this.state.initial) || 0, Number(this.state.monthly) || 0);\n      if (sim) {\n        hasResults = true;\n        const finalValue = sim.value[sim.value.length - 1];\n        const finalIndex = sim.index[sim.index.length - 1];\n        const days = (new Date(endDate + 'T00:00:00Z') - new Date(startDate + 'T00:00:00Z')) / 86400000;\n        const cagr = Math.pow(finalIndex / 100, 365.25 / Math.max(days, 1)) - 1;\n        const ddSeries = sim.value.map((v, i, arr) => {\n          const peak = Math.max(...arr.slice(0, i + 1));\n          return (v / peak) - 1;\n        });\n        const maxDd = Math.min(...ddSeries);\n        const rrrSeries = ddSeries.map(dd => 1 / (1 + dd));\n        const gain = finalValue - sim.totalContributed;\n        const tir = this.xirr(sim.cashflows);\n\n        statCards = [\n          { label: 'Aportado', value: fmtUSD(sim.totalContributed), color: '#171B21' },\n          { label: 'Valor final', value: fmtUSD(finalValue), color: '#171B21' },\n          { label: 'Ganancia', value: fmtUSD(gain), color: gain >= 0 ? '#059669' : '#DC2626' },\n          { label: 'Máx. DRAWDOWN', value: fmtPct(maxDd), color: '#DC2626' },\n          { label: 'RETORNO ANUAL', value: tir === null ? '—' : fmtPct(tir), color: tir === null ? '#6B7280' : pctColor(tir) },\n        ];\n\n        valueChart = buildChart(sim.dates, sim.value, {\n          width: 900, height: 320, padTop: 20, padBottom: 46, padLeft: 108, padRight: 20,\n          yFormat: v => fmtUSD(v), yTickCount: 4, xTickCount: 7,\n        });\n        ddChart = buildChart(sim.dates, ddSeries, {\n          width: 900, height: 190, padTop: 20, padBottom: 40, padLeft: 108, padRight: 20,\n          baseline: 0, yFormat: v => (v * 100).toFixed(0) + '%', yTickCount: 3, xTickCount: 7,\n        });\n        rrrChart = buildChart(sim.dates, rrrSeries, {\n          width: 900, height: 190, padTop: 20, padBottom: 40, padLeft: 108, padRight: 20,\n          baseline: 1, yFormat: v => ((v - 1) * 100).toFixed(0) + '%', yTickCount: 3, xTickCount: 7,\n        });\n\n        valueChart.onMove = this.makeMoveHandler('value', valueChart);\n        valueChart.onLeave = this.makeLeaveHandler('value');\n        valueChart.hover = this.hoverInfo('value', valueChart, v => fmtUSD(v));\n\n        ddChart.onMove = this.makeMoveHandler('dd', ddChart);\n        ddChart.onLeave = this.makeLeaveHandler('dd');\n        ddChart.hover = this.hoverInfo('dd', ddChart, v => fmtPct(v));\n\n        rrrChart.onMove = this.makeMoveHandler('rrr', rrrChart);\n        rrrChart.onLeave = this.makeLeaveHandler('rrr');\n        rrrChart.hover = this.hoverInfo('rrr', rrrChart, v => ((v - 1) * 100).toFixed(1) + '%');\n\n        const TABLE_LABELS = {\n          PORTFOLIO: 'Cartera',\n          GAINVEST: 'FCI Gainvest\\nRenta Fija USD',\n          ON: 'Obligaciones\\nNegociables',\n          GLD: 'GLD',\n          VIG: 'VIG',\n          GSPC: '^GSPC',\n          QQQ: 'QQQ',\n          TQQQ: 'TQQQ',\n        };\n        const columns = [{ key: 'PORTFOLIO', label: 'Cartera', color: '#171B21', highlight: true }]\n          .concat(activeAssets.map(a => ({ key: a.key, label: a.label, color: a.color, highlight: false })));\n        columns.forEach(c => {\n          const parts = (TABLE_LABELS[c.key] || c.label).split('\\n');\n          c.labelLine1 = parts[0];\n          c.labelLine2 = parts[1] || '';\n          c.headerStyle = `text-align:center;font-size:${c.highlight ? '11px' : '9px'};line-height:1.25;color:#171B21;font-weight:${c.highlight ? 800 : 600};padding:6px 3px;border-bottom:1px solid #E4E7EC;background:${c.highlight ? '#EAF0FF' : 'transparent'};white-space:${c.highlight ? 'nowrap' : 'normal'};overflow-wrap:break-word;`;\n        });\n\n        const perAssetSeries = {};\n        activeAssets.forEach(a => {\n          const raw = data[a.key].filter(r => r[0] >= startDate && r[0] <= endDate);\n          const dts = raw.map(r => r[0]);\n          const vals = raw.map(r => r[1]);\n          if (dts[0] !== startDate) { dts.unshift(startDate); vals.unshift(valueAtOrBefore(data[a.key], startDate)); }\n          perAssetSeries[a.key] = { dates: dts, values: vals };\n        });\n        perAssetSeries.PORTFOLIO = { dates: sim.dates, values: sim.index };\n        const portfolioDdSeries = { dates: sim.dates, values: sim.value };\n\n        const startYear = parseInt(startDate.slice(0, 4), 10);\n        const endYear = parseInt(endDate.slice(0, 4), 10);\n        const yearlyByCol = {};\n        const ddByCol = {};\n        columns.forEach(c => {\n          const s = perAssetSeries[c.key];\n          yearlyByCol[c.key] = this.yearlyReturns(s.dates, s.values, startDate, endDate);\n          ddByCol[c.key] = c.key === 'PORTFOLIO' ? this.maxDrawdown(portfolioDdSeries.values) : this.maxDrawdown(s.values);\n        });\n\n        const rows = [];\n        for (let y = startYear; y <= endYear; y++) {\n          rows.push({\n            year: y,\n            cells: columns.map(c => {\n              const v = yearlyByCol[c.key][y];\n              const cellColor = v === undefined ? '#C7CBD1' : pctColor(v);\n              const cellStyle = `text-align:center;font-size:${c.highlight ? '13px' : '12px'};font-weight:${c.highlight ? 800 : 400};color:${cellColor};padding:6px 6px;border-bottom:1px solid #F1F2F4;background:${c.highlight ? '#EAF0FF' : 'transparent'};`;\n              return v === undefined\n                ? { text: '—', style: cellStyle }\n                : { text: fmtPct(v), style: cellStyle };\n            }),\n          });\n        }\n        annualTable = {\n          columns,\n          rows,\n          ddRow: columns.map(c => ({\n            text: fmtPct(ddByCol[c.key]),\n            style: `text-align:center;font-size:${c.highlight ? '13px' : '12px'};font-weight:800;color:#DC2626;padding:8px 6px;background:${c.highlight ? '#EAF0FF' : 'transparent'};`,\n          })),\n        };\n      }\n    }\n\n    return {\n      authenticated: this.state.authenticated,\n      loginUser: this.state.loginUser,\n      loginPass: this.state.loginPass,\n      loginError: this.state.loginError,\n      onLoginUserChange: (e) => this.setState({ loginUser: e.target.value, loginError: false }),\n      onLoginPassChange: (e) => this.setState({ loginPass: e.target.value, loginError: false }),\n      onLoginSubmit: (e) => {\n        e.preventDefault();\n        if (this.state.loginUser.trim().toLowerCase() === 'inviu' && this.state.loginPass === 'mmasocios') {\n          if (typeof sessionStorage !== 'undefined') sessionStorage.setItem('mma_auth', '1');\n          this.setState({ authenticated: true, loginError: false });\n        } else {\n          this.setState({ loginError: true });\n        }\n      },\n      assetOptions, assetRows,\n      sumLabel: sumPct + '%',\n      sumColor: sumPct === 100 ? '#059669' : '#9AA1AC',\n      initial: this.state.initial,\n      monthly: this.state.monthly,\n      startDate, endDate, minDate, maxDate,\n      onInitialChange: (e) => this.setState({ initial: Number(e.target.value) }),\n      onMonthlyChange: (e) => this.setState({ monthly: Number(e.target.value) }),\n      onStartChange: (e) => this.setState({ startDate: e.target.value }),\n      onEndChange: (e) => this.setState({ endDate: e.target.value }),\n      assetDescriptions: ASSET_KEYS.map(k => ({ key: k, fullName: ASSETS[k].fullName, description: ASSETS[k].description, color: ASSETS[k].color })),\n      hasResults, noAssetsMessage,\n      statCards, valueChart, ddChart, rrrChart, annualTable,\n      chartColor: this.props.chartColor ?? '#2F6FED',\n      showRecoveryChart: this.props.showRecoveryChart ?? true,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
